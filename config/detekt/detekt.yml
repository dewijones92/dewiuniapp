# Overrides on top of detekt's default config (buildUponDefaultConfig = true).

naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']

complexity:
  LongParameterList:
    # Parameters with defaults are opt-in, builder-style; they don't add call-site burden.
    ignoreDefaultParameters: true
    # Composables idiomatically take state + several event callbacks.
    ignoreAnnotated: ['Composable']

style:
  UnusedPrivateMember:
    ignoreAnnotated: ['Preview']
  ReturnCount:
    # Railway-style early returns on failure paths are house style.
    max: 4
    excludeGuardClauses: true
  MagicNumber:
    # Named property declarations (e.g. Compose colour palettes) are already well named.
    ignorePropertyDeclaration: true

formatting:
  active: true
  android: true
