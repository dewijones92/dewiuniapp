name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Quality gates + build
    runs-on: ubuntu-latest
    permissions:
      contents: write # rolling 'latest' release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Static analysis (detekt)
        run: ./gradlew detekt --no-daemon

      - name: Android Lint
        run: ./gradlew lint --no-daemon

      - name: Unit tests
        run: ./gradlew test --no-daemon

      - name: Coverage gate (logic modules)
        run: ./gradlew koverVerify --no-daemon

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: uniapp-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # ---- Rolling signed release of main's tip (for Obtainium) ----

      - name: Decode signing keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/uniapp-release.jks"

      - name: Assemble signed release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/uniapp-release.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PversionCode=$((100 + GITHUB_RUN_NUMBER)) \
            -PversionName="0.1.${GITHUB_RUN_NUMBER}" \
            -PgitSha="${GITHUB_SHA:0:7}"

      - name: Publish rolling 'latest' release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk uniapp.apk
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          gh release create latest uniapp.apk \
            --prerelease \
            --title "UniApp main tip (0.1.${GITHUB_RUN_NUMBER})" \
            --notes "Rolling build of main at ${GITHUB_SHA}. Signed; safe to update over previous builds."

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            build/reports/
